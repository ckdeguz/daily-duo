<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Duo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base: #0f0f13;
    --bg-surface: #1a1a22;
    --text-primary: #e8e6e3;
    --text-secondary: #9ca3af;
    --accent: #a78bfa;
    --accent2: #60a5fa;
    --accent3: #34d399;
    --success: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
    --surface-subtle: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.08);
    --surface-hover-strong: rgba(255,255,255,0.1);
    --border-subtle: rgba(255,255,255,0.06);
    --border-default: rgba(255,255,255,0.08);
    --border-medium: rgba(255,255,255,0.15);
    --card-shadow: 0 8px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.06);
    --progress-track: rgba(255,255,255,0.08);
    --spinner-track: rgba(255,255,255,0.15);
  }

  [data-theme="light"] {
    --bg-base: #f0f0f5;
    --bg-surface: #ffffff;
    --text-primary: #1a1a2e;
    --text-secondary: #6b7280;
    --surface-subtle: rgba(0,0,0,0.03);
    --surface-hover: rgba(0,0,0,0.06);
    --surface-hover-strong: rgba(0,0,0,0.08);
    --border-subtle: rgba(0,0,0,0.06);
    --border-default: rgba(0,0,0,0.08);
    --border-medium: rgba(0,0,0,0.15);
    --card-shadow: 0 8px 40px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.06);
    --progress-track: rgba(0,0,0,0.08);
    --spinner-track: rgba(0,0,0,0.12);
  }

  body {
    font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .card {
    width: 500px;
    max-width: 100%;
    padding: 32px 28px;
    border-radius: 20px;
    background: var(--bg-surface);
    box-shadow: var(--card-shadow);
    text-align: center;
  }
  .card.wide { width: 660px; }

  @media (max-width: 600px) {
    body { padding: 12px; align-items: flex-start; padding-top: 16px; }
    .card { padding: 24px 16px; border-radius: 16px; }
    #theme-toggle { top: 8px; right: 8px; width: 34px; height: 34px; font-size: 15px; }
  }

  .logo-icon { font-size: 44px; margin-bottom: 4px; display: block; }

  .title {
    font-size: 28px;
    font-weight: 800;
    margin: 8px 0 4px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin: 4px 0 16px;
  }

  .date-chip {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    background: rgba(167,139,250,0.12);
    color: var(--accent);
    margin-bottom: 20px;
  }

  .how-it-works {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 16px 0 24px;
    text-align: left;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .step-text { font-size: 14px; color: var(--text-secondary); }

  .name-input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--border-medium);
    background: var(--surface-subtle);
    color: var(--text-primary);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    margin-bottom: 14px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--accent); }

  .primary-btn {
    width: 100%;
    padding: 14px 0;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(96,165,250,0.3);
  }
  .primary-btn:hover { transform: translateY(-1px); }
  .primary-btn:active { transform: translateY(0) scale(0.98); }
  .primary-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .phase-label { font-size: 14px; font-weight: 600; color: var(--accent); }
  .counter { font-size: 14px; font-weight: 700; color: var(--text-secondary); }

  .progress-track {
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--progress-track);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
  }

  .phase-transition {
    padding: 10px 16px;
    border-radius: 10px;
    background: rgba(167,139,250,0.12);
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .question {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.4;
    margin: 0 0 20px;
    animation: fadeInUp 0.35s ease both;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--border-default);
    background: var(--surface-subtle);
    color: var(--text-primary);
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    animation: fadeInUp 0.35s ease both;
  }
  .option-btn:hover {
    background: var(--surface-hover);
    border-color: var(--border-medium);
    transform: translateY(-1px);
  }
  .option-btn:active { transform: translateY(0) scale(0.98); }
  .option-btn.selected {
    background: rgba(167,139,250,0.2);
    border-color: var(--accent);
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 16px;
    padding: 8px 16px;
    border-radius: 10px;
    border: none;
    background: var(--surface-hover);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover {
    background: var(--surface-hover-strong);
    color: var(--text-primary);
  }
  .back-btn:active { transform: scale(0.96); }

  .share-section {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid var(--border-subtle);
  }
  .share-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .share-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .share-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: 10px;
    border: 1px solid var(--border-default);
    background: var(--surface-subtle);
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }
  .share-btn:hover {
    background: var(--surface-hover-strong);
    border-color: var(--border-medium);
    transform: translateY(-1px);
  }
  .share-btn:active { transform: translateY(0) scale(0.97); }
  .share-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .share-btn.native-share {
    width: 100%;
    justify-content: center;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
    margin-bottom: 8px;
  }
  .share-btn.native-share:hover { opacity: 0.9; }
  .share-btn.copied { color: var(--success); border-color: var(--success); }

  .share-results-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .share-results-row .primary-btn {
    flex: 1;
  }
  .share-results-btn {
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    /* padding: 14px 20px; */
    border-radius: 12px;
    border: 1px solid rgba(167,139,250,0.3);
    background: rgba(167,139,250,0.08);
    color: var(--accent);
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .share-results-btn:hover {
    background: rgba(167,139,250,0.15);
    border-color: var(--accent);
  }
  .share-results-btn:active { transform: scale(0.97); }
  .share-results-btn svg { width: 18px; height: 18px; }

  .opt-letter {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--surface-hover);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--accent);
  }

  .link-box {
    padding: 14px;
    border-radius: 10px;
    background: var(--surface-subtle);
    border: 1px solid var(--border-default);
    margin-bottom: 14px;
    word-break: break-all;
  }
  .link-text { font-size: 13px; color: var(--accent2); font-family: monospace; }

  .hint { font-size: 13px; color: #6b7280; margin-top: 12px; }

  .result-header { margin-bottom: 24px; }
  .score-emoji { font-size: 48px; display: block; }
  .name-badges {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 12px;
  }
  .badge {
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--surface-hover);
    font-size: 14px;
    font-weight: 600;
  }
  .vs { font-size: 14px; color: var(--text-secondary); }

  .scores-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 16px 0 8px;
  }
  .score-card {
    padding: 14px 20px;
    border-radius: 14px;
    background: var(--surface-subtle);
    border: 1px solid var(--border-default);
    text-align: center;
    flex: 1;
    max-width: 200px;
  }
  .score-card-name { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
  .score-card-value { font-size: 28px; font-weight: 800; }
  .score-card-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  .results-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
    text-align: left;
  }
  .result-row {
    padding: 14px 16px;
    border-radius: 12px;
    background: var(--surface-subtle);
  }
  .result-row.both-match { border-left: 3px solid var(--success); }
  .result-row.one-match { border-left: 3px solid var(--warn); }
  .result-row.no-match { border-left: 3px solid var(--danger); }

  .result-q {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }
  .match-icon { font-size: 16px; font-weight: 800; flex-shrink: 0; margin-top: 2px; }
  .match-icon.yes { color: var(--success); }
  .match-icon.no { color: var(--danger); }
  .result-q-text { font-size: 14px; font-weight: 600; line-height: 1.4; }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
    padding-left: 24px;
  }
  .result-col-header {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .result-cell {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .result-cell-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-label { font-size: 11px; color: #6b7280; }
  .result-value { font-size: 13px; font-weight: 500; }
  .result-value.bold { font-weight: 600; }
  .result-value.dim { opacity: 0.7; }
  .result-value.match-highlight { color: var(--success); }
  .result-value.miss-highlight { color: var(--danger); }

  .spinner {
    width: 24px; height: 24px;
    border: 3px solid var(--spinner-track);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 20px auto;
  }

  .tab-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border-default);
    background: var(--surface-subtle);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: rgba(167,139,250,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  #theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    color: var(--text-primary);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 18px;
    cursor: pointer;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--card-shadow);
    transition: background 0.2s, border-color 0.2s;
  }
  #theme-toggle:hover { background: var(--surface-hover); }
</style>
</head>

<button id="theme-toggle" aria-label="Toggle theme"></button>
<div id="app"><div class="card"><div class="spinner"></div><p class="subtitle" style="margin-top:12px">Loading...</p></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="questions.js"></script>

<script>
// ═══════════════ FIREBASE CONFIG ═══════════════
firebase.initializeApp({
  apiKey: "AIzaSyAm4REUN9J2i4WQUuW2H7jdr6zE0kE06MM",
  authDomain: "daily-duo-74c8d.firebaseapp.com",
  databaseURL: "https://daily-duo-74c8d-default-rtdb.firebaseio.com",
  projectId: "daily-duo-74c8d",
  storageBucket: "daily-duo-74c8d.firebasestorage.app",
  messagingSenderId: "51525045037",
  appId: "1:51525045037:web:2135897e66de4f7cea21a4"
});

const db = firebase.database();

const fbStorage = {
  async get(key) {
    try {
      const snap = await db.ref("sessions/" + key).once("value");
      return snap.exists() ? snap.val() : null;
    } catch (e) { console.error("Firebase get error:", e); return null; }
  },
  async set(key, val) {
    try {
      await db.ref("sessions/" + key).set(val);
      return true;
    } catch (e) { console.error("Firebase set error:", e); return false; }
  }
};

// ═══════════════ UTILITIES ═══════════════
function seededRandom(seed) {
  let s = seed;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

function getDateSeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

function getDailyQuestions() {
  const totalQ = ALL_QUESTIONS.length;
  const questionsPerDay = 10;
  const totalCycles = Math.floor(totalQ / questionsPerDay); // full days before a repeat cycle
  const dateSeed = getDateSeed();

  // Determine which cycle we're in and which day within that cycle
  // Use a base date so day 0 = some fixed start; each day increments
  const baseDate = new Date(2025, 0, 1); // Jan 1, 2025
  const today = new Date();
  today.setHours(0,0,0,0);
  const dayIndex = Math.floor((today - baseDate) / 86400000);
  const cycleDay = dayIndex % totalCycles; // which day within this cycle
  const cycleNum = Math.floor(dayIndex / totalCycles); // which cycle we're on

  // Shuffle all questions using cycle number as seed (new shuffle each full cycle)
  const rng = seededRandom(cycleNum * 99991 + 7);
  const indices = Array.from({ length: totalQ }, (_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }

  // Pick the slice for today's day within the cycle
  const start = cycleDay * questionsPerDay;
  return indices.slice(start, start + questionsPerDay).map(i => ALL_QUESTIONS[i]);
}

function getDateString() {
  return new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
}

function generateId() {
  const chars = "abcdefghijkmnpqrstuvwxyz23456789";
  let id = "";
  for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}

function esc(str) {
  const div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}

// ═══════════════ APP STATE ═══════════════
const state = {
  screen: "loading",
  sessionId: null,
  p1Answers: [],
  p1Guesses: [],
  p2Answers: [],
  p2Guesses: [],
  currentQ: 0,
  phase: "own", // "own" or "guess"
  results: null,
  p1Name: "",
  p2Name: "",
  animating: false,
  errorMsg: "",
  questions: getDailyQuestions(),
  resultsTab: "p1", // which perspective to show in results
};

const $ = (sel) => document.querySelector(sel);
const app = () => document.getElementById("app");

// ═══════════════ RENDER ═══════════════
function render() {
  switch (state.screen) {
    case "loading": return renderLoading();
    case "home": return renderHome();
    case "play": return renderPlay();
    case "share": return renderShare();
    case "p2-intro": return renderP2Intro();
    case "p2-play": return renderP2Play();
    case "results": return renderResults();
    case "error": return renderError();
    default: app().innerHTML = "";
  }
}

function renderLoading() {
  app().innerHTML = '<div class="card"><div class="spinner"></div><p class="subtitle" style="margin-top:12px">Loading...</p></div>';
}

function renderHome() {
  const shareUrl = location.origin + location.pathname;
  const shareText = "Try Daily Duo! 10 daily questions to see how well you know your friends ⚡";
  const hasNativeShare = !!navigator.share;

  app().innerHTML = `
    <div class="card">
      <span class="logo-icon">⚡</span>
      <h1 class="title">Daily Duo</h1>
      <p class="subtitle">10 daily questions. See how well you know each other.</p>
      <div class="date-chip">${getDateString()}</div>
      <div class="how-it-works">
        <div class="step"><span class="step-num">1</span><span class="step-text">Answer 10 questions & guess your friend's picks</span></div>
        <div class="step"><span class="step-num">2</span><span class="step-text">Share the link with your friend</span></div>
        <div class="step"><span class="step-num">3</span><span class="step-text">They answer & guess yours — then compare!</span></div>
      </div>
      <input class="name-input" type="text" placeholder="Your name" maxlength="20" id="p1NameInput" value="${esc(state.p1Name)}">
      <button class="primary-btn" id="startBtn" ${state.p1Name.trim() ? '' : 'disabled'}>Start Today's Quiz →</button>
      <div class="share-section">
        <p class="share-label">Invite a friend to play</p>
        ${hasNativeShare ? `<button class="share-btn native-share" id="nativeShareBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Share Daily Duo
        </button>` : ''}
        <div class="share-row">
          <a class="share-btn" id="shareTwitter" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            X

function renderPlay() {
  const q = state.questions[state.currentQ];
  const isGuess = state.phase === "guess";
  const phaseTransition = isGuess && state.currentQ === 0
    ? '<div class="phase-transition">Now guess what your friend will choose!</div>' : '';
  const canGoBack = state.currentQ > 0;

  app().innerHTML = `
    <div class="card">
      <div class="top-bar">
        <span class="phase-label">${isGuess ? '🔮 Guess their answers' : '📝 Your answers'}</span>
        <span class="counter">${state.currentQ + 1}/10</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${(state.currentQ / 10) * 100}%"></div></div>
      ${phaseTransition}
      <h2 class="question">${esc(q.q)}</h2>
      <div class="options">
        ${q.opts.map((opt, i) => `
          <button class="option-btn" style="animation-delay:${i * 60}ms" data-idx="${i}">
            <span class="opt-letter">${["A","B","C","D"][i]}</span>
            <span>${esc(opt)}</span>
          </button>
        `).join('')}
      </div>
      ${canGoBack ? '<button class="back-btn" id="backBtn">← Go Back</button>' : ''}
    </div>`;
  bindP1Options();
  if (canGoBack) {
    $("#backBtn").addEventListener("click", () => {
      if (state.animating) return;
      if (state.phase === "own") {
        state.p1Answers.pop();
      } else {
        state.p1Guesses.pop();
      }
      state.currentQ--;
      render();
    });
  }
}

function bindP1Options() {
  document.querySelectorAll(".option-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (state.animating) return;
      state.animating = true;
      const idx = parseInt(btn.dataset.idx);
      btn.classList.add("selected");

      if (state.phase === "own") {
        state.p1Answers.push(idx);
        if (state.p1Answers.length === 10) {
          setTimeout(() => { state.phase = "guess"; state.currentQ = 0; state.animating = false; render(); }, 500);
        } else {
          setTimeout(() => { state.currentQ++; state.animating = false; render(); }, 400);
        }
      } else {
        state.p1Guesses.push(idx);
        if (state.p1Guesses.length === 10) {
          setTimeout(() => { saveP1(); }, 400);
        } else {
          setTimeout(() => { state.currentQ++; state.animating = false; render(); }, 400);
        }
      }
    });
  });
}

// ─── RESULTS ───
function generateShareImage(r, p1Score, p2Score, totalScore, emoji, msg) {
  const W = 1080, H = 1350; // Instagram Story size
  const canvas = document.createElement("canvas");
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext("2d");

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, "#0f0f13");
  bg.addColorStop(0.5, "#1a1a2e");
  bg.addColorStop(1, "#0f0f13");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Decorative accent glow
  ctx.save();
  const glow = ctx.createRadialGradient(W / 2, 400, 0, W / 2, 400, 400);
  glow.addColorStop(0, "rgba(167,139,250,0.15)");
  glow.addColorStop(1, "rgba(167,139,250,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // Helper: rounded rect
  function roundRect(x, y, w, h, rad) {
    ctx.beginPath();
    ctx.moveTo(x + rad, y);
    ctx.lineTo(x + w - rad, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + rad);
    ctx.lineTo(x + w, y + h - rad);
    ctx.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
    ctx.lineTo(x + rad, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - rad);
    ctx.lineTo(x, y + rad);
    ctx.quadraticCurveTo(x, y, x + rad, y);
    ctx.closePath();
  }

  // Logo & title
  ctx.textAlign = "center";
  ctx.font = "80px sans-serif";
  ctx.fillStyle = "#e8e6e3";
  ctx.fillText("⚡", W / 2, 160);

  ctx.font = "bold 56px 'DM Sans', sans-serif";
  ctx.fillStyle = "#e8e6e3";
  ctx.fillText("Daily Duo", W / 2, 240);

  // Date
  ctx.font = "28px 'DM Sans', sans-serif";
  ctx.fillStyle = "#9ca3af";
  ctx.fillText(getDateString(), W / 2, 290);

  // Emoji + message
  ctx.font = "100px sans-serif";
  ctx.fillText(emoji, W / 2, 430);

  ctx.font = "bold 42px 'DM Sans', sans-serif";
  ctx.fillStyle = "#e8e6e3";
  ctx.fillText(msg, W / 2, 500);

  // Combined score
  ctx.font = "bold 120px 'DM Sans', sans-serif";
  const scoreGrad = ctx.createLinearGradient(W / 2 - 100, 560, W / 2 + 100, 680);
  scoreGrad.addColorStop(0, "#a78bfa");
  scoreGrad.addColorStop(1, "#60a5fa");
  ctx.fillStyle = scoreGrad;
  ctx.fillText(`${totalScore}/20`, W / 2, 660);

  // Player score cards
  const cardW = 440, cardH = 220, cardY = 740, gap = 40;
  const card1X = W / 2 - cardW - gap / 2;
  const card2X = W / 2 + gap / 2;

  function drawScoreCard(x, y, name, score, otherName) {
    const color = score >= 8 ? "#22c55e" : score >= 5 ? "#f59e0b" : "#ef4444";
    roundRect(x, y, cardW, cardH, 24);
    ctx.fillStyle = "rgba(255,255,255,0.04)";
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.font = "bold 30px 'DM Sans', sans-serif";
    ctx.fillStyle = "#e8e6e3";
    ctx.fillText(name, x + cardW / 2, y + 55);

    ctx.font = "bold 72px 'DM Sans', sans-serif";
    ctx.fillStyle = color;
    ctx.fillText(`${score}/10`, x + cardW / 2, y + 145);

    ctx.font = "24px 'DM Sans', sans-serif";
    ctx.fillStyle = "#9ca3af";
    ctx.fillText(`guessing ${otherName}`, x + cardW / 2, y + 190);
  }

  drawScoreCard(card1X, cardY, r.p1Name, p1Score, r.p2Name);
  drawScoreCard(card2X, cardY, r.p2Name, p2Score, r.p1Name);

  // "vs" between cards
  ctx.font = "bold 28px 'DM Sans', sans-serif";
  ctx.fillStyle = "#9ca3af";
  ctx.fillText("vs", W / 2, cardY + cardH / 2 + 10);

  // Score bar visualization
  const barY = 1020, barH = 40, barPad = 100;
  roundRect(barPad, barY, W - barPad * 2, barH, barH / 2);
  ctx.fillStyle = "rgba(255,255,255,0.06)";
  ctx.fill();

  const fillW = Math.max(barH, ((W - barPad * 2) * totalScore) / 20);
  roundRect(barPad, barY, fillW, barH, barH / 2);
  const barGrad = ctx.createLinearGradient(barPad, 0, barPad + fillW, 0);
  barGrad.addColorStop(0, "#a78bfa");
  barGrad.addColorStop(1, "#60a5fa");
  ctx.fillStyle = barGrad;
  ctx.fill();

  // CTA at bottom
  ctx.font = "bold 32px 'DM Sans', sans-serif";
  ctx.fillStyle = "#a78bfa";
  ctx.fillText("Think you know your friends?", W / 2, 1180);

  ctx.font = "26px 'DM Sans', sans-serif";
  ctx.fillStyle = "#9ca3af";
  const shareUrl = location.origin + location.pathname;
  ctx.fillText(shareUrl, W / 2, 1230);

  return canvas;
}

function shareResultsImage() {
  const r = state.results;
  const p1Score = r.p1Guesses.reduce((s, g, i) => s + (g === r.p2Answers[i] ? 1 : 0), 0);
  const p2Score = r.p2Guesses.reduce((s, g, i) => s + (g === r.p1Answers[i] ? 1 : 0), 0);
  const totalScore = p1Score + p2Score;
  const emoji = totalScore === 20 ? "🔥" : totalScore >= 16 ? "🔥" : totalScore >= 10 ? "🤝" : "😅";
  const msg = totalScore === 20 ? "Perfect sync!" : totalScore >= 16 ? "Almost telepathic!" : totalScore >= 10 ? "Not bad at all!" : totalScore >= 6 ? "Room to grow!" : "Opposites attract?";

  const canvas = generateShareImage(r, p1Score, p2Score, totalScore, emoji, msg);

  canvas.toBlob(async (blob) => {
    const file = new File([blob], "daily-duo-results.png", { type: "image/png" });

    // Try native share with the image (works great on mobile for IG stories)
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          title: "Daily Duo Results",
          text: "Check out our Daily Duo score! ⚡",
          files: [file],
        });
        return;
      } catch (e) { /* user cancelled, fall through to download */ }
    }

    // Fallback: download the image
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "daily-duo-results.png";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, "image/png");
}

    });
  });
  $("#replayBtn").addEventListener("click", () => { location.hash = ""; location.reload(); });
  $("#shareResultsBtn").addEventListener("click", shareResultsImage);
}

function renderError() {
  app().innerHTML = `
    <div class="card">
      <span class="logo-icon">😕</span>
      <h1 class="title">Oops</h1>
      <p class="subtitle">${esc(state.errorMsg)}</p>
      <button class="primary-btn" id="homeBtn">Go Home</button>
    </div>`;
  $("#homeBtn").addEventListener("click", () => { location.hash = ""; location.reload(); });
}

// ═══════════════ SAVE FUNCTIONS ═══════════════
async function saveP1() {
  renderLoading();
  const id = generateId();
  const payload = {
    p1Name: state.p1Name,
    p1Answers: state.p1Answers,
    p1Guesses: state.p1Guesses,
    dateSeed: getDateSeed(),
    createdAt: Date.now(),
  };
  const ok = await fbStorage.set(id, payload);
  state.animating = false;
  if (ok) {
    state.sessionId = id;
    state.screen = "share";
  } else {
    state.errorMsg = "Couldn't save your answers. Please check your connection and try again.";
    state.screen = "error";
  }
  render();
}

async function saveP2() {
  renderLoading();
  const data = await fbStorage.get(state.sessionId);
  state.animating = false;
  if (!data) {
    state.errorMsg = "Session not found.";
    state.screen = "error";
    render();
    return;
  }
  data.p2Name = state.p2Name;
  data.p2Answers = state.p2Answers;
  data.p2Guesses = state.p2Guesses;
  await fbStorage.set(state.sessionId, data);
  state.results = data;
  state.screen = "results";
  render();
}

// ═══════════════ INIT ═══════════════
async function init() {
  const hash = location.hash.replace("#", "");
  if (hash) {
    const data = await fbStorage.get(hash);
    if (data) {
      state.sessionId = hash;
      if (data.p2Answers && data.p2Guesses) {
        state.results = data;
        state.screen = "results";
      } else {
        state.p1Name = data.p1Name || "Player 1";
        state.screen = "p2-intro";
      }
    } else {
      state.errorMsg = "This link doesn't seem to be valid or may have expired.";
      state.screen = "error";
    }
  } else {
    state.screen = "home";
  }
  render();
}

init();

(function() {
  const btn = document.getElementById('theme-toggle');
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  btn.textContent = saved === 'light' ? '☀️' : '🌙';
  btn.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    btn.textContent = next === 'light' ? '☀️' : '🌙';
  });
})();
</script>
