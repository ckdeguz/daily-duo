<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Duo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2609403051184314"
     crossorigin="anonymous"></script>
</head>
<body>

<button id="theme-toggle" aria-label="Toggle theme"></button>
<div id="app"><div class="card"><div class="spinner"></div><p class="subtitle" style="margin-top:12px">Loading...</p></div></div>

<!-- Ad Slot: Results Screen -->
<div id="ad-results-slot" style="display:none; width:100%; max-width:560px; margin:14px auto 0; text-align:center;">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-2609403051184314"
       data-ad-slot="5461171275"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script src="questions.js"></script>
<script src="adblock.js"></script>
<script src="app.js"></script>

<script>
  function showResultsAd() {
    const slot = document.getElementById("ad-results-slot");
    if (!slot) return;
    slot.style.display = "block";
    if (!slot.dataset.adPushed) {
      try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
      slot.dataset.adPushed = "1";
    }
  }
</script>

</body>
</html>
