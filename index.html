<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Duo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base: #0f0f13;
    --bg-surface: #1a1a22;
    --text-primary: #e8e6e3;
    --text-secondary: #9ca3af;
    --accent: #a78bfa;
    --accent2: #60a5fa;
    --accent3: #34d399;
    --success: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
  }

  body {
    font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .card {
    width: 100%;
    max-width: 440px;
    padding: 32px 28px;
    border-radius: 20px;
    background: var(--bg-surface);
    box-shadow: 0 8px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.06);
    text-align: center;
  }
  .card.wide { max-width: 560px; }

  .logo-icon { font-size: 44px; margin-bottom: 4px; display: block; }

  .title {
    font-size: 28px;
    font-weight: 800;
    margin: 8px 0 4px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin: 4px 0 16px;
  }

  .date-chip {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    background: rgba(167,139,250,0.12);
    color: var(--accent);
    margin-bottom: 20px;
  }

  .how-it-works {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 16px 0 24px;
    text-align: left;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .step-text { font-size: 14px; color: #d1d5db; }

  .name-input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: var(--text-primary);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    margin-bottom: 14px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--accent); }

  .primary-btn {
    width: 100%;
    padding: 14px 0;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(96,165,250,0.3);
  }
  .primary-btn:hover { transform: translateY(-1px); }
  .primary-btn:active { transform: translateY(0) scale(0.98); }
  .primary-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .phase-label { font-size: 14px; font-weight: 600; color: var(--accent); }
  .counter { font-size: 14px; font-weight: 700; color: var(--text-secondary); }

  .progress-track {
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.08);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
  }

  .phase-transition {
    padding: 10px 16px;
    border-radius: 10px;
    background: rgba(167,139,250,0.12);
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .question {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.4;
    margin: 0 0 20px;
    animation: fadeInUp 0.35s ease both;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: var(--text-primary);
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    animation: fadeInUp 0.35s ease both;
  }
  .option-btn:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-1px);
  }
  .option-btn:active { transform: translateY(0) scale(0.98); }
  .option-btn.selected {
    background: rgba(167,139,250,0.2);
    border-color: var(--accent);
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 16px;
    padding: 8px 16px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.06);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.1);
    color: var(--text-primary);
  }
  .back-btn:active { transform: scale(0.96); }

  .opt-letter {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--accent);
  }

  .link-box {
    padding: 14px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 14px;
    word-break: break-all;
  }
  .link-text { font-size: 13px; color: var(--accent2); font-family: monospace; }

  .hint { font-size: 13px; color: #6b7280; margin-top: 12px; }

  .result-header { margin-bottom: 24px; }
  .score-emoji { font-size: 48px; display: block; }
  .name-badges {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 12px;
  }
  .badge {
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    font-size: 14px;
    font-weight: 600;
  }
  .vs { font-size: 14px; color: var(--text-secondary); }

  .scores-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 16px 0 8px;
  }
  .score-card {
    padding: 14px 20px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    text-align: center;
    flex: 1;
    max-width: 200px;
  }
  .score-card-name { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
  .score-card-value { font-size: 28px; font-weight: 800; }
  .score-card-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  .results-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
    text-align: left;
  }
  .result-row {
    padding: 14px 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
  }
  .result-row.both-match { border-left: 3px solid var(--success); }
  .result-row.one-match { border-left: 3px solid var(--warn); }
  .result-row.no-match { border-left: 3px solid var(--danger); }

  .result-q {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }
  .match-icon { font-size: 16px; font-weight: 800; flex-shrink: 0; margin-top: 2px; }
  .match-icon.yes { color: var(--success); }
  .match-icon.no { color: var(--danger); }
  .result-q-text { font-size: 14px; font-weight: 600; line-height: 1.4; }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
    padding-left: 24px;
  }
  .result-col-header {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .result-cell {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .result-cell-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-label { font-size: 11px; color: #6b7280; }
  .result-value { font-size: 13px; font-weight: 500; }
  .result-value.bold { font-weight: 600; }
  .result-value.dim { opacity: 0.7; }
  .result-value.match-highlight { color: var(--success); }
  .result-value.miss-highlight { color: var(--danger); }

  .spinner {
    width: 24px; height: 24px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 20px auto;
  }

  .tab-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: rgba(167,139,250,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<div id="app"><div class="card"><div class="spinner"></div><p class="subtitle" style="margin-top:12px">Loading...</p></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="questions.js"></script>

<script>
// ═══════════════ FIREBASE CONFIG ═══════════════
firebase.initializeApp({
  apiKey: "AIzaSyAm4REUN9J2i4WQUuW2H7jdr6zE0kE06MM",
  authDomain: "daily-duo-74c8d.firebaseapp.com",
  databaseURL: "https://daily-duo-74c8d-default-rtdb.firebaseio.com",
  projectId: "daily-duo-74c8d",
  storageBucket: "daily-duo-74c8d.firebasestorage.app",
  messagingSenderId: "51525045037",
  appId: "1:51525045037:web:2135897e66de4f7cea21a4"
});

const db = firebase.database();

const fbStorage = {
  async get(key) {
    try {
      const snap = await db.ref("sessions/" + key).once("value");
      return snap.exists() ? snap.val() : null;
    } catch (e) { console.error("Firebase get error:", e); return null; }
  },
  async set(key, val) {
    try {
      await db.ref("sessions/" + key).set(val);
      return true;
    } catch (e) { console.error("Firebase set error:", e); return false; }
  }
};

// ═══════════════ UTILITIES ═══════════════
function seededRandom(seed) {
  let s = seed;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

function getDateSeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

function getDailyQuestions() {
  const totalQ = ALL_QUESTIONS.length;
  const questionsPerDay = 10;
  const totalCycles = Math.floor(totalQ / questionsPerDay); // full days before a repeat cycle
  const dateSeed = getDateSeed();

  // Determine which cycle we're in and which day within that cycle
  // Use a base date so day 0 = some fixed start; each day increments
  const baseDate = new Date(2025, 0, 1); // Jan 1, 2025
  const today = new Date();
  today.setHours(0,0,0,0);
  const dayIndex = Math.floor((today - baseDate) / 86400000);
  const cycleDay = dayIndex % totalCycles; // which day within this cycle
  const cycleNum = Math.floor(dayIndex / totalCycles); // which cycle we're on

  // Shuffle all questions using cycle number as seed (new shuffle each full cycle)
  const rng = seededRandom(cycleNum * 99991 + 7);
  const indices = Array.from({ length: totalQ }, (_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }

  // Pick the slice for today's day within the cycle
  const start = cycleDay * questionsPerDay;
  return indices.slice(start, start + questionsPerDay).map(i => ALL_QUESTIONS[i]);
}

function getDateString() {
  return new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
}

function generateId() {
  const chars = "abcdefghijkmnpqrstuvwxyz23456789";
  let id = "";
  for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}

function esc(str) {
  const div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}

// ═══════════════ APP STATE ═══════════════
const state = {
  screen: "loading",
  sessionId: null,
  p1Answers: [],
  p1Guesses: [],
  p2Answers: [],
  p2Guesses: [],
  currentQ: 0,
  phase: "own", // "own" or "guess"
  results: null,
  p1Name: "",
  p2Name: "",
  animating: false,
  errorMsg: "",
  questions: getDailyQuestions(),
  resultsTab: "p1", // which perspective to show in results
};

const $ = (sel) => document.querySelector(sel);
const app = () => document.getElementById("app");

// ═══════════════ RENDER ═══════════════
function render() {
  switch (state.screen) {
    case "loading": return renderLoading();
    case "home": return renderHome();
    case "play": return renderPlay();
    case "share": return renderShare();
    case "p2-intro": return renderP2Intro();
    case "p2-play": return renderP2Play();
    case "results": return renderResults();
    case "error": return renderError();
    default: app().innerHTML = "";
  }
}

function renderLoading() {
  app().innerHTML = '<div class="card"><div class="spinner"></div><p class="subtitle" style="margin-top:12px">Loading...</p></div>';
}

function renderHome() {
  app().innerHTML = `
    <div class="card">
      <span class="logo-icon">⚡</span>
      <h1 class="title">Daily Duo</h1>
      <p class="subtitle">10 daily questions. See how well you know each other.</p>
      <div class="date-chip">${getDateString()}</div>
      <div class="how-it-works">
        <div class="step"><span class="step-num">1</span><span class="step-text">Answer 10 questions & guess your friend's picks</span></div>
        <div class="step"><span class="step-num">2</span><span class="step-text">Share the link with your friend</span></div>
        <div class="step"><span class="step-num">3</span><span class="step-text">They answer & guess yours — then compare!</span></div>
      </div>
      <input class="name-input" type="text" placeholder="Your name" maxlength="20" id="p1NameInput" value="${esc(state.p1Name)}">
      <button class="primary-btn" id="startBtn" ${state.p1Name.trim() ? '' : 'disabled'}>Start Today's Quiz →</button>
    </div>`;
  const inp = $("#p1NameInput");
  const btn = $("#startBtn");
  inp.addEventListener("input", () => { state.p1Name = inp.value; btn.disabled = !inp.value.trim(); });
  btn.addEventListener("click", () => { state.screen = "play"; state.currentQ = 0; state.phase = "own"; render(); });
}

// ─── P1 Play (own answers + guesses) ───
function renderPlay() {
  const q = state.questions[state.currentQ];
  const isGuess = state.phase === "guess";
  const phaseTransition = isGuess && state.currentQ === 0
    ? '<div class="phase-transition">Now guess what your friend will choose!</div>' : '';
  const canGoBack = state.currentQ > 0;

  app().innerHTML = `
    <div class="card">
      <div class="top-bar">
        <span class="phase-label">${isGuess ? '🔮 Guess their answers' : '📝 Your answers'}</span>
        <span class="counter">${state.currentQ + 1}/10</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${(state.currentQ / 10) * 100}%"></div></div>
      ${phaseTransition}
      <h2 class="question">${esc(q.q)}</h2>
      <div class="options">
        ${q.opts.map((opt, i) => `
          <button class="option-btn" style="animation-delay:${i * 60}ms" data-idx="${i}">
            <span class="opt-letter">${["A","B","C","D"][i]}</span>
            <span>${esc(opt)}</span>
          </button>
        `).join('')}
      </div>
      ${canGoBack ? '<button class="back-btn" id="backBtn">← Go Back</button>' : ''}
    </div>`;
  bindP1Options();
  if (canGoBack) {
    $("#backBtn").addEventListener("click", () => {
      if (state.animating) return;
      if (state.phase === "own") {
        state.p1Answers.pop();
      } else {
        state.p1Guesses.pop();
      }
      state.currentQ--;
      render();
    });
  }
}

function bindP1Options() {
  document.querySelectorAll(".option-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (state.animating) return;
      state.animating = true;
      const idx = parseInt(btn.dataset.idx);
      btn.classList.add("selected");

      if (state.phase === "own") {
        state.p1Answers.push(idx);
        if (state.p1Answers.length === 10) {
          setTimeout(() => { state.phase = "guess"; state.currentQ = 0; state.animating = false; render(); }, 500);
        } else {
          setTimeout(() => { state.currentQ++; state.animating = false; render(); }, 400);
        }
      } else {
        state.p1Guesses.push(idx);
        if (state.p1Guesses.length === 10) {
          setTimeout(() => { saveP1(); }, 400);
        } else {
          setTimeout(() => { state.currentQ++; state.animating = false; render(); }, 400);
        }
      }
    });
  });
}

// ─── P2 Play (own answers + guesses) ───
function renderP2Play() {
  const q = state.questions[state.currentQ];
  const isGuess = state.phase === "guess";
  const phaseTransition = isGuess && state.currentQ === 0
    ? `<div class="phase-transition">Now guess what ${esc(state.p1Name)} chose!</div>` : '';
  const canGoBack = state.currentQ > 0;

  app().innerHTML = `
    <div class="card">
      <div class="top-bar">
        <span class="phase-label">${isGuess ? '🔮 Guess ' + esc(state.p1Name) + "'s answers" : '📝 Your answers'}</span>
        <span class="counter">${state.currentQ + 1}/10</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${(state.currentQ / 10) * 100}%"></div></div>
      ${phaseTransition}
      <h2 class="question">${esc(q.q)}</h2>
      <div class="options">
        ${q.opts.map((opt, i) => `
          <button class="option-btn" style="animation-delay:${i * 60}ms" data-idx="${i}">
            <span class="opt-letter">${["A","B","C","D"][i]}</span>
            <span>${esc(opt)}</span>
          </button>
        `).join('')}
      </div>
      ${canGoBack ? '<button class="back-btn" id="backBtn">← Go Back</button>' : ''}
    </div>`;
  bindP2Options();
  if (canGoBack) {
    $("#backBtn").addEventListener("click", () => {
      if (state.animating) return;
      if (state.phase === "own") {
        state.p2Answers.pop();
      } else {
        state.p2Guesses.pop();
      }
      state.currentQ--;
      render();
    });
  }
}

function bindP2Options() {
  document.querySelectorAll(".option-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (state.animating) return;
      state.animating = true;
      const idx = parseInt(btn.dataset.idx);
      btn.classList.add("selected");

      if (state.phase === "own") {
        state.p2Answers.push(idx);
        if (state.p2Answers.length === 10) {
          setTimeout(() => { state.phase = "guess"; state.currentQ = 0; state.animating = false; render(); }, 500);
        } else {
          setTimeout(() => { state.currentQ++; state.animating = false; render(); }, 400);
        }
      } else {
        state.p2Guesses.push(idx);
        if (state.p2Guesses.length === 10) {
          setTimeout(() => { saveP2(); }, 400);
        } else {
          setTimeout(() => { state.currentQ++; state.animating = false; render(); }, 400);
        }
      }
    });
  });
}

function renderShare() {
  const url = `${location.origin}${location.pathname}#${state.sessionId}`;
  app().innerHTML = `
    <div class="card">
      <span class="logo-icon">🔗</span>
      <h1 class="title">You're all set!</h1>
      <p class="subtitle">Send this link to your friend. They'll answer the same questions and guess yours too. Come back to this link to see results!</p>
      <div class="link-box"><span class="link-text">${esc(url)}</span></div>
      <button class="primary-btn" id="copyBtn">Copy Link</button>
      <p class="hint">Bookmark or save this link — you'll need it to see results!</p>
    </div>`;
  $("#copyBtn").addEventListener("click", () => {
    navigator.clipboard.writeText(url).catch(() => {});
    $("#copyBtn").textContent = "✓ Copied!";
    setTimeout(() => { if ($("#copyBtn")) $("#copyBtn").textContent = "Copy Link"; }, 2000);
  });
}

function renderP2Intro() {
  app().innerHTML = `
    <div class="card">
      <span class="logo-icon">👋</span>
      <h1 class="title">${esc(state.p1Name)} sent you a Daily Duo!</h1>
      <p class="subtitle">Answer 10 questions, then guess what ${esc(state.p1Name)} picked. See how well you know each other!</p>
      <div class="date-chip">${getDateString()}</div>
      <input class="name-input" type="text" placeholder="Your name" maxlength="20" id="p2NameInput" value="${esc(state.p2Name)}">
      <button class="primary-btn" id="p2StartBtn" ${state.p2Name.trim() ? '' : 'disabled'}>Let's Go →</button>
    </div>`;
  const inp = $("#p2NameInput");
  const btn = $("#p2StartBtn");
  inp.addEventListener("input", () => { state.p2Name = inp.value; btn.disabled = !inp.value.trim(); });
  btn.addEventListener("click", () => { state.screen = "p2-play"; state.currentQ = 0; state.phase = "own"; render(); });
}

// ─── RESULTS ───
function renderResults() {
  const r = state.results;
  if (!r) return;
  const qs = getDailyQuestions();
  const p1Score = r.p1Guesses.reduce((s, g, i) => s + (g === r.p2Answers[i] ? 1 : 0), 0);
  const p2Score = r.p2Guesses.reduce((s, g, i) => s + (g === r.p1Answers[i] ? 1 : 0), 0);
  const totalScore = p1Score + p2Score;
  const emoji = totalScore >= 16 ? "🔥" : totalScore >= 10 ? "🤝" : "😅";
  const msg = totalScore === 20 ? "Perfect sync!" : totalScore >= 16 ? "Almost telepathic!" : totalScore >= 10 ? "Not bad at all!" : totalScore >= 6 ? "Room to grow!" : "Opposites attract?";

  const p1Color = p1Score >= 8 ? "var(--success)" : p1Score >= 5 ? "var(--warn)" : "var(--danger)";
  const p2Color = p2Score >= 8 ? "var(--success)" : p2Score >= 5 ? "var(--warn)" : "var(--danger)";

  const tab = state.resultsTab;

  let questionRows = "";
  qs.forEach((q, i) => {
    if (tab === "p1") {
      const match = r.p1Guesses[i] === r.p2Answers[i];
      questionRows += `
        <div class="result-row ${match ? 'both-match' : 'no-match'}">
          <div class="result-q">
            <span class="match-icon ${match ? 'yes' : 'no'}">${match ? '✓' : '✗'}</span>
            <span class="result-q-text">${esc(q.q)}</span>
          </div>
          <div class="result-grid" style="grid-template-columns:1fr;">
            <div class="result-cell">
              <div class="result-cell-row">
                <span class="result-label">${esc(r.p1Name)} guessed</span>
                <span class="result-value ${match ? 'match-highlight' : 'miss-highlight'}">${esc(q.opts[r.p1Guesses[i]])}</span>
              </div>
              <div class="result-cell-row">
                <span class="result-label">${esc(r.p2Name)} answered</span>
                <span class="result-value bold">${esc(q.opts[r.p2Answers[i]])}</span>
              </div>
            </div>
          </div>
        </div>`;
    } else {
      const match = r.p2Guesses[i] === r.p1Answers[i];
      questionRows += `
        <div class="result-row ${match ? 'both-match' : 'no-match'}">
          <div class="result-q">
            <span class="match-icon ${match ? 'yes' : 'no'}">${match ? '✓' : '✗'}</span>
            <span class="result-q-text">${esc(q.q)}</span>
          </div>
          <div class="result-grid" style="grid-template-columns:1fr;">
            <div class="result-cell">
              <div class="result-cell-row">
                <span class="result-label">${esc(r.p2Name)} guessed</span>
                <span class="result-value ${match ? 'match-highlight' : 'miss-highlight'}">${esc(q.opts[r.p2Guesses[i]])}</span>
              </div>
              <div class="result-cell-row">
                <span class="result-label">${esc(r.p1Name)} answered</span>
                <span class="result-value bold">${esc(q.opts[r.p1Answers[i]])}</span>
              </div>
            </div>
          </div>
        </div>`;
    }
  });

  app().innerHTML = `
    <div class="card wide">
      <div class="result-header">
        <span class="score-emoji">${emoji}</span>
        <p class="subtitle" style="margin-bottom:8px">${msg}</p>
        <div class="name-badges">
          <span class="badge">${esc(r.p1Name || "Player 1")}</span>
          <span class="vs">vs</span>
          <span class="badge">${esc(r.p2Name || "Player 2")}</span>
        </div>
        <div class="scores-row">
          <div class="score-card">
            <div class="score-card-name">${esc(r.p1Name)}</div>
            <div class="score-card-value" style="color:${p1Color};-webkit-text-fill-color:${p1Color}">${p1Score}/10</div>
            <div class="score-card-label">guessing ${esc(r.p2Name)}</div>
          </div>
          <div class="score-card">
            <div class="score-card-name">${esc(r.p2Name)}</div>
            <div class="score-card-value" style="color:${p2Color};-webkit-text-fill-color:${p2Color}">${p2Score}/10</div>
            <div class="score-card-label">guessing ${esc(r.p1Name)}</div>
          </div>
        </div>
      </div>

      <div class="tab-row">
        <button class="tab-btn ${tab === 'p1' ? 'active' : ''}" data-tab="p1">${esc(r.p1Name)}'s guesses</button>
        <button class="tab-btn ${tab === 'p2' ? 'active' : ''}" data-tab="p2">${esc(r.p2Name)}'s guesses</button>
      </div>

      <div class="results-list">
        ${questionRows}
      </div>
      <button class="primary-btn" id="replayBtn">Play Again Tomorrow</button>
    </div>`;

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.resultsTab = btn.dataset.tab;
      render();
    });
  });
  $("#replayBtn").addEventListener("click", () => { location.hash = ""; location.reload(); });
}

function renderError() {
  app().innerHTML = `
    <div class="card">
      <span class="logo-icon">😕</span>
      <h1 class="title">Oops</h1>
      <p class="subtitle">${esc(state.errorMsg)}</p>
      <button class="primary-btn" id="homeBtn">Go Home</button>
    </div>`;
  $("#homeBtn").addEventListener("click", () => { location.hash = ""; location.reload(); });
}

// ═══════════════ SAVE FUNCTIONS ═══════════════
async function saveP1() {
  renderLoading();
  const id = generateId();
  const payload = {
    p1Name: state.p1Name,
    p1Answers: state.p1Answers,
    p1Guesses: state.p1Guesses,
    dateSeed: getDateSeed(),
    createdAt: Date.now(),
  };
  const ok = await fbStorage.set(id, payload);
  state.animating = false;
  if (ok) {
    state.sessionId = id;
    state.screen = "share";
  } else {
    state.errorMsg = "Couldn't save your answers. Please check your connection and try again.";
    state.screen = "error";
  }
  render();
}

async function saveP2() {
  renderLoading();
  const data = await fbStorage.get(state.sessionId);
  state.animating = false;
  if (!data) {
    state.errorMsg = "Session not found.";
    state.screen = "error";
    render();
    return;
  }
  data.p2Name = state.p2Name;
  data.p2Answers = state.p2Answers;
  data.p2Guesses = state.p2Guesses;
  await fbStorage.set(state.sessionId, data);
  state.results = data;
  state.screen = "results";
  render();
}

// ═══════════════ INIT ═══════════════
async function init() {
  const hash = location.hash.replace("#", "");
  if (hash) {
    const data = await fbStorage.get(hash);
    if (data) {
      state.sessionId = hash;
      if (data.p2Answers && data.p2Guesses) {
        state.results = data;
        state.screen = "results";
      } else {
        state.p1Name = data.p1Name || "Player 1";
        state.screen = "p2-intro";
      }
    } else {
      state.errorMsg = "This link doesn't seem to be valid or may have expired.";
      state.screen = "error";
    }
  } else {
    state.screen = "home";
  }
  render();
}

init();
</script>
